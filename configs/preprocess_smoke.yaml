dataset:
  root: dataset_smoke/carnatic
  audio_filename: song.mp3
  metadata_filename: song.json

preprocess:
  out_dir: data/smoke/wav16k
  sample_rate: 16000
  channels: 1

  normalize:
    method: rms
    target_rms_db: -20.0
    peak_db: -1.0

  segment:
    enabled: true
    segment_seconds: 4.0
    hop_seconds: 4.0
    min_segment_seconds: 1.0

manifest:
  out_path: data/smoke/segments_manifest.jsonl

